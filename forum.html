<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MangaSite — Форум</title>

  <link rel="stylesheet" href="styles.css">

  <!-- CSS-тема highlight.js: делает подсветку реально видимой -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css">

  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/network.js"></script>
  <script type="module" src="js/markdown.js"></script>
</head>
<body>

<header class="header">
  <h1 class="header__title">MangaSite</h1>
  <nav class="nav">
    <ul class="nav__list">
      <li class="nav__item"><a class="nav__link" href="index.html">Главное</a></li>
      <li class="nav__item"><a class="nav__link" href="new.html">Новинки</a></li>
      <li class="nav__item"><a class="nav__link" href="popular.html">Популярное</a></li>
      <li class="nav__item"><a class="nav__link" href="forum.html">Форум</a></li>
    </ul>
  </nav>
</header>

<main class="main">

  <div class="main__content">

    <section class="section">
      <h2 class="section__title">Форум</h2>
      <p>Обсуждения по манге и аниме.</p>
    </section>

    <section class="section">
      <h2 class="section__title">Новости аниме</h2>

      <div class="toolbar">
        <button class="btn" id="reload-live" type="button">Обновить новости</button>
      </div>

      <div class="loader-wrap" id="live-loader" hidden>
        <div class="loader" aria-label="Загрузка" role="status"></div>
        <p class="hint">Загрузка новостей...</p>
      </div>

      <div id="live-error" class="error" hidden></div>
      <div id="live-content" class="live-content" hidden></div>

      <template id="tpl-news">
        <article class="post">
          <h3 class="post__title"></h3>
          <p class="post__meta"></p>
          <p class="post__body"></p>
          <p class="hint"><a class="news__link" target="_blank" rel="noopener noreferrer">Открыть</a></p>
        </article>
      </template>
    </section>

    <section class="section">
      <h2 class="section__title">Редактор поста (Markdown)</h2>

      <div class="md">
        <div class="md__editor">
          <label class="hint" for="md-input">Текст поста:</label>
          <textarea id="md-input" class="md__textarea" rows="12"></textarea>

          <div class="toolbar">
            <button class="btn" id="md-render" type="button">Обновить превью</button>
            <button class="btn" id="md-example" type="button">Вставить пример</button>
          </div>

        </div>

        <div class="md__preview">
          <p class="hint">Превью:</p>
          <div id="md-preview" class="md__preview-box"></div>
        </div>
      </div>
    </section>

  </div>

  <aside class="aside">
    <h2 class="section__title">Правила</h2>
    <ol class="list">
      <li>Без спама и оскорблений</li>
      <li>Пишите по теме</li>
      <li>Ссылки только по делу</li>
    </ol>
  </aside>

</main>

<footer class="footer">
  <div class="footer__banner">купи</div>
  <p class="footer__text">© 2025 MangaSite</p>
  <p class="footer__load" data-load-time>Время загрузки: ...</p>
</footer>

</body>
</html>
