<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MangaSite — Обратная связь</title>
    <link rel="stylesheet" href="styles.css">
    <script src="js/app.js"></script>
    <script src="js/feedback.js"></script>
</head>
<body>

<header class="header">
    <h1 class="header__title">MangaSite</h1>
    <nav class="nav">
        <ul class="nav__list">
            <li class="nav__item"><a class="nav__link" href="index.html">Главное</a></li>
            <li class="nav__item"><a class="nav__link" href="new.html">Новинки</a></li>
            <li class="nav__item"><a class="nav__link" href="popular.html">Популярное</a></li>
            <li class="nav__item"><a class="nav__link" href="forum.html">Форум</a></li>
            <li class="nav__item"><a class="nav__link" href="feedback.html">Обратная связь</a></li>
        </ul>
    </nav>
</header>

<main class="main">

    <div class="main__content">

        <section class="section">
            <h2 class="section__title">Добавить отзыв</h2>

            <form class="feedback-form" id="feedbackForm">
                <div class="feedback-form__row">
                    <label class="feedback-form__label" for="nameInput">Имя</label>
                    <input
                            class="feedback-form__input"
                            id="nameInput"
                            name="name"
                            type="text"
                            required
                            placeholder="Например: Анна"
                            autocomplete="name"
                    >
                </div>

                <div class="feedback-form__row">
                    <label class="feedback-form__label" for="emailInput">Почта</label>
                    <input
                            class="feedback-form__input"
                            id="emailInput"
                            name="email"
                            type="text"
                            required
                            placeholder="Например: name@example.com"
                            autocomplete="email"
                    >
                </div>

                <div class="feedback-form__row">
                    <label class="feedback-form__label" for="textInput">Отзыв</label>
                    <textarea
                            class="feedback-form__textarea"
                            id="textInput"
                            name="text"
                            required
                            placeholder="Напишите ваш отзыв"
                    ></textarea>
                </div>

                <div class="feedback-form__actions">
                    <button class="feedback-form__btn" type="submit">Добавить</button>
                    <button class="feedback-form__btn feedback-form__btn--secondary" type="reset">Очистить</button>
                </div>

                <p class="feedback-form__error" id="formError" aria-live="polite"></p>
            </form>
        </section>

        <section class="section">
            <h2 class="section__title">Отзывы</h2>

            <div class="feedback">
                <ul class="feedback__list" id="feedbackList"></ul>
                <p class="feedback__empty" id="emptyState">Пока нет отзывов.</p>
            </div>

            <template id="feedbackItemTemplate">
                <li class="card feedback__item" data-id="">
                    <h3 class="card__title feedback__title"></h3>

                    <p class="feedback__line">
                        <strong>Почта:</strong> <span class="feedback__email"></span>
                    </p>

                    <p class="feedback__line">
                        <strong>Текст:</strong> <span class="feedback__text"></span>
                    </p>

                    <div class="feedback__actions">
                        <button class="feedback__btn" type="button" data-action="edit">Изменить</button>
                        <button class="feedback__btn feedback__btn--danger" type="button" data-action="delete">Удалить</button>
                    </div>

                    <form class="feedback-edit" data-edit-form hidden>
                        <div class="feedback-edit__row">
                            <label class="feedback-edit__label">Новый текст</label>
                            <textarea class="feedback-edit__textarea" required></textarea>
                        </div>

                        <div class="feedback__actions">
                            <button class="feedback__btn" type="submit">Сохранить</button>
                            <button class="feedback__btn feedback__btn--secondary" type="button" data-action="cancel">Отмена</button>
                        </div>

                        <p class="feedback-edit__error" aria-live="polite"></p>
                    </form>
                </li>
            </template>
        </section>

    </div>

</main>

<footer class="footer">
    <div class="footer__banner">Реклама</div>
    <p class="footer__text">© 2025 MangaSite</p>
    <p class="footer__load" data-load-time>Время загрузки: ...</p>
</footer>

</body>
</html>
